# Netlify configuration for NEON STRIKE.
#
# This is a no-build, single-file static site: the entire game is index.html
# (inline favicon data-URI, inline importmap, three.js from the unpkg CDN). It
# is the ONLY file the live site needs.
#
# The repo root also holds dev-only files — CLAUDE.md, PLAN.md, README.md,
# Makefile, .gitignore — that should not be published. Serving the root with
# `publish = "."` would leak all of them to the live URL.
#
# So the "build" stages just index.html into dist/, stamping the __VERSION__
# placeholder (see the version badge on the start/pause cards) with the
# nearest git tag along the way, and `publish = "dist"` ships that directory
# alone. This isn't a real build step (no compile/bundle/transpile) and it
# still defuses Netlify's framework auto-detection, since specifying an
# explicit command disables it. No _redirects/_headers are needed: this is
# not an SPA, and the CDN import resolves fine under Netlify's default headers.

[build]
  publish = "dist"
  # Netlify's clone is shallow and may not fetch tags, so `git describe --tags`
  # silently comes up empty without the explicit fetch below (the badge would
  # then show a bare commit hash forever instead of the real version).
  #
  # The sed pattern is scoped to ">__VERSION__<" (the badge divs), NOT a bare
  # "__VERSION__" — a bare match also rewrites the JS placeholder-guard's own
  # string literal (`el.textContent === '__VERSION__'`), which then immediately
  # flips the freshly-stamped badge back to "dev" at page load.
  command = "git fetch --tags --force 2>/dev/null; VER=$(git describe --tags --always --dirty 2>/dev/null || echo ${COMMIT_REF:0:7}) && mkdir -p dist && sed \"s/>__VERSION__</>$VER</\" index.html > dist/index.html"

  # Skip the deploy when a push only touched dev-only files (docs, Makefile,
  # .gitignore) — nothing the live site serves. Netlify's `ignore` command:
  # exit 0 = cancel the build, non-zero = build. This lists the files changed
  # since the last deployed commit, strips out the dev-only ones, and cancels
  # only if nothing deployable is left. It's a DENYLIST, so any new/unlisted
  # file (index.html, netlify.toml, package.json, netlify/**) still deploys —
  # the safe default. The `test -n "$CACHED_COMMIT_REF"` guard forces a build
  # on the first deploy or a cleared cache, when there's no baseline to diff.
  ignore = '''test -n "$CACHED_COMMIT_REF" && test -z "$(git diff --name-only $CACHED_COMMIT_REF $COMMIT_REF | grep -vE '^(CLAUDE\.md|PLAN\.md|README\.md|Makefile|\.gitignore)$')"'''

# Serverless: the global-leaderboard endpoint (roadmap item 36 — the project's
# first backend). `netlify/functions/` is Netlify's default functions directory
# (stated explicitly here for clarity). scores.mjs is a v2 function that declares
# its own route via `export const config = { path: "/api/scores" }`, so it is
# served SAME-ORIGIN at /api/scores — which the game's CSP `connect-src 'self'`
# already allows, so no CSP change was needed. Functions bundle independently of
# the static `publish = "dist"` above; the sed-stamp build command never touches
# them. @netlify/blobs is installed from package.json at deploy time.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Caching: index.html must revalidate on every request so a fresh deploy shows up
# immediately (no stale HTML served from the CDN edge). There are no fingerprinted
# local assets to cache long-lived — three.js comes from unpkg with its own caching.
# Netlify serves "/" from index.html, so both paths get the rule (they merge with
# the /* security block below).
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Baseline security headers for every response.
#
# The Content-Security-Policy is the delicate one — it must NOT break the game, which
# loads entirely inline plus three.js from the unpkg CDN:
#   - script-src 'unsafe-inline'      -> the inline importmap, watchdog, and module scripts
#                                        (an importmap is an inline script to CSP; do NOT add a
#                                         nonce/hash — that makes browsers ignore 'unsafe-inline'
#                                         and the importmap + module die)
#   - script-src https://unpkg.com    -> ES-module `import` fetches are governed by script-src
#   - connect-src https://unpkg.com   -> belt-and-suspenders for the module fetch
#   - style-src 'unsafe-inline'       -> the inline <style> block
#   - img-src data:                   -> the inline favicon data-URI
# WebGL shader compile and Web Audio synthesis need no CSP allowances (no eval, no blob workers).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "no-referrer"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://unpkg.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
